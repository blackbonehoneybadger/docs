<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#0a0e14" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Badger CFO" />
  <title>Badger CFO</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png" />
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <!-- Login gate -->
  <div id="login" class="login hidden">
    <div class="login-card">
      <div class="brand-mark">₿</div>
      <h1>Badger CFO</h1>
      <p class="muted">Boss My Life</p>
      <input id="login-code" type="password" inputmode="numeric" placeholder="Код доступа" autocomplete="current-password" />
      <button id="login-btn" class="btn-primary">Войти</button>
      <p id="login-error" class="login-error"></p>
    </div>
  </div>

  <!-- App -->
  <div id="app" class="app hidden">
    <main id="view" class="view"></main>

    <nav class="tabbar">
      <button class="tab active" data-tab="home">
        <svg viewBox="0 0 24 24"><path d="M3 11l9-8 9 8v9a2 2 0 0 1-2 2h-4v-6H9v6H5a2 2 0 0 1-2-2z"/></svg>
        <span>Главная</span>
      </button>
      <button class="tab" data-tab="portfolio">
        <svg viewBox="0 0 24 24"><path d="M4 19V5m5 14V9m5 10V3m5 16v-7"/></svg>
        <span>Портфель</span>
      </button>
      <button class="tab tab-fab" data-tab="add">
        <span class="fab">+</span>
      </button>
      <button class="tab" data-tab="bills">
        <svg viewBox="0 0 24 24"><path d="M5 3h14v18l-3-2-2 2-2-2-2 2-2-2-3 2zM8 8h8M8 12h8"/></svg>
        <span>Платежи</span>
      </button>
      <button class="tab" data-tab="advice">
        <svg viewBox="0 0 24 24"><path d="M12 3a6 6 0 0 1 4 10.5c-.7.7-1 1.2-1 2.5H9c0-1.3-.3-1.8-1-2.5A6 6 0 0 1 12 3zM9 20h6M10 22h4"/></svg>
        <span>Совет</span>
      </button>
    </nav>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
